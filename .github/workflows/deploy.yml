name: Deploy to DreamHost

on:
  push:
    branches:
      - main  # triggers when you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avz --delete
          path: ./           # the folder in your repo to upload
          remote_path: /home/${{ secrets.DREAMHOST_USERNAME }}/pumasoc.greykit.com/
          remote_host: ${{ secrets.DREAMHOST_HOST }}
          remote_user: ${{ secrets.DREAMHOST_USERNAME }}
          remote_key: ${{ secrets.DREAMHOST_SSH_KEY }}
